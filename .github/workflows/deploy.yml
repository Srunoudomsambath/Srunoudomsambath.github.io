name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build all apps
        run: npx turbo run build
      - name: Debug output
        run: |
          echo "=== main ==="
          ls apps/main/
          echo "=== projects ==="
          ls apps/projects/
          echo "=== blog ==="
          ls apps/blog/
      - name: Merge static outputs
        run: |
          mkdir -p dist
          # main app goes to root
          cp -r apps/main/out/. dist/
          # projects app goes to /projects
          mkdir -p dist/projects
          cp -r apps/projects/out/. dist/projects/
          # blog app goes to /blog
          mkdir -p dist/blog
          cp -r apps/blog/out/. dist/blog/
          # copy CNAME
          cp CNAME dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4